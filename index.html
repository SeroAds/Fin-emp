      </tbody></table></div></div>
    <div class="card">
      <div class="bar" style="margin-bottom:10px"><h3 style="margin:0">Tendencia ${one?esc(one.nombre)+' ('+mon+')':'general (COP)'}</h3>
        <div class="sp"></div>
        <div class="seg" id="sg"><button data-g="semanal" class="${repG==='semanal'?'on':''}">Semanal</button>
        <button data-g="mensual" class="${repG==='mensual'?'on':''}">Mensual</button></div></div>
      <div class="chart-box"><canvas id="c1"></canvas></div>
      <div class="tbl" style="margin-top:14px"><table>
        <thead><tr><th>${repG==='semanal'?'Semana':'Mes'}</th><th class="num">Ingresos</th><th class="num">Gastos</th><th class="num">Utilidad</th><th class="num">Margen</th></tr></thead>
        <tbody>${buckets.map((b,i)=>`<tr><td>${esc(b)}</td><td class="num">${money(bI[i],mon)}</td>
          <td class="num">${money(bG[i],mon)}</td>
          <td class="num ${bI[i]-bG[i]>=0?'pos':'neg'}">${money(bI[i]-bG[i],mon)}</td>
          <td class="num">${pct(bI[i]-bG[i],bI[i])}</td></tr>`).join('')}</tbody></table></div></div>
    <div class="grid2">
      <div class="card"><h3>Ingresos por categoría</h3><div class="chart-box"><canvas id="c2"></canvas></div></div>
      <div class="card"><h3>Gastos por categoría</h3><div class="chart-box"><canvas id="c3"></canvas></div></div>
    </div>
    <div class="card"><h3>Gastos por categoría vs ingreso bruto</h3><div class="tbl"><table>
      <thead><tr><th>Categoría</th><th class="num">Gasto</th><th class="num">% de los gastos</th><th class="num">% del ingreso bruto</th></tr></thead>
      <tbody>${gcKeys.length? gcKeys.map(k=>`<tr><td>${esc(k)}</td>
        <td class="num">${money(gC[k],mon)}</td>
        <td class="num">${pct(gC[k],gTot)}</td>
        <td class="num ${bruto>0&&gC[k]/bruto>=0.3?'neg':''}">${pct(gC[k],bruto)}</td></tr>`).join('')
        :'<tr><td colspan="4" class="empty">Sin gastos en el período</td></tr>'}
      ${gcKeys.length?`<tr class="trow"><td>Total gastos</td><td class="num">${money(gTot,mon)}</td>
        <td class="num">100%</td><td class="num">${pct(gTot,bruto)}</td></tr>`:''}
      </tbody></table></div>
      <div class="note">Ingreso bruto del período: <b>${money(bruto,mon)}</b> (ventas totales, IVA incluido). Muestra cuánto pesa cada categoría de gasto sobre lo que entra.</div></div>
    <div class="grid2">
      <div class="card"><h3>Ingresos por fuente</h3><div class="chart-box"><canvas id="c4"></canvas></div></div>
      <div class="card"><h3>Detalle por fuente</h3><div class="tbl"><table>
        <thead><tr><th>Fuente</th><th class="num">Ingresos</th><th class="num">%</th></tr></thead>
        <tbody>${fk.length? fk.map(k=>`<tr><td>${esc(k)}</td><td class="num">${money(fu[k],mon)}</td><td class="num">${pct(fu[k],fT)}</td></tr>`).join('')
          :'<tr><td colspan="3" class="empty">Sin ingresos en el período</td></tr>'}</tbody></table></div></div>
    </div>
    <div class="card"><h3>IVA por pagar — 19% en ventas COP</h3>
      <div class="kpis" style="margin-bottom:6px">
        <div class="kpi"><div class="t">Total IVA generado</div><div class="v">${fmtCOP(ivaT)}</div></div>
        ${pl.filter(r=>r.e.moneda==='COP').map(r=>`<div class="kpi"><div class="t">${esc(r.e.nombre)}</div><div class="v">${fmtCOP(r.iva)}</div></div>`).join('')}
      </div>
      <div class="note">IVA generado en ventas. El valor a declarar descuenta el IVA pagado en compras (descontable), que se maneja aparte.</div></div>`;

  chart('c1',{type:'bar',data:{labels:buckets.map(b=>repG==='semanal'?wLbl(b):b),datasets:[
    {label:'Ingresos',data:bI,backgroundColor:'#0a6cff',borderRadius:3},
    {label:'Gastos',data:bG,backgroundColor:'#e0604f',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});
  const ik=Object.keys(iC), gk=Object.keys(gC);
  chart('c2',{type:'doughnut',data:{labels:ik,datasets:[{data:ik.map(k=>iC[k]),backgroundColor:PAL}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right'}}}});
  chart('c3',{type:'doughnut',data:{labels:gk,datasets:[{data:gk.map(k=>gC[k]),backgroundColor:PAL}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right'}}}});
  chart('c4',{type:'bar',data:{labels:fk,datasets:[{data:fk.map(k=>fu[k]),backgroundColor:'#0a6cff',borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
  $$('#sg button').forEach(b=>b.onclick=()=>{ repG=b.dataset.g; draw(); });
}

/* ============================================================
   AJUSTES — solo admin.
   ============================================================ */
function vAjustes(){
  if (S.user.rol!=='admin'){ $('#view').innerHTML='<div class="empty">Solo administradores</div>'; return; }
  const man = manualFx();
  $('#view').innerHTML = `
    <h2>Ajustes</h2><div class="sub">Configuración del sistema</div>

    <div class="card"><h3>Empresas</h3><div class="tbl"><table>
      <thead><tr><th>Nombre</th><th>Moneda</th><th>Color</th><th>Tipo</th><th class="num">Compras/mes</th><th class="num">Vida (meses)</th><th></th></tr></thead>
      <tbody id="eT">${S.empresas.map((e,i)=>`
        <tr data-i="${i}" data-id="${esc(e.id)}">
          <td><input class="ii eN" value="${esc(e.nombre)}" style="width:168px"></td>
          <td><select class="ii eM"><option ${e.moneda==='COP'?'selected':''}>COP</option><option ${e.moneda==='USD'?'selected':''}>USD</option></select></td>
          <td><input type="color" class="eC" value="${esc(e.color||'#0a6cff')}" style="padding:1px;width:42px;height:30px"></td>
          <td><select class="ii eT2"><option value="agencia" ${e.tipo==='agencia'?'selected':''}>Agencia</option><option value="ecommerce" ${e.tipo==='ecommerce'?'selected':''}>E-commerce</option></select></td>
          <td class="num"><input type="number" class="ii iw eF" step="0.1" value="${N(e.freqComprasMes)}"></td>
          <td class="num"><input type="number" class="ii iw eV" step="1" value="${N(e.vidaClienteMeses)}"></td>
          <td class="acts"><button class="link warn eX">Eliminar</button></td></tr>`).join('')}
      </tbody></table></div>
      <div class="bar" style="margin:10px 0 0"><button class="ghost sm" id="eAdd">+ Agregar</button><div class="sp"></div><button class="btn" id="eGo">Guardar empresas</button></div></div>

    <div class="card"><h3>Tipo de cambio USD → COP</h3>
      <div class="bar" style="margin:0">
        <label style="text-transform:none;font-size:13px;font-weight:500;color:var(--ink);display:flex;gap:6px;align-items:center"><input type="radio" name="rM" value="live" ${man?'':'checked'}> Automático${S.liveRate?' (en vivo: '+nf(S.liveRate,2)+')':''}</label>
        <label style="text-transform:none;font-size:13px;font-weight:500;color:var(--ink);display:flex;gap:6px;align-items:center"><input type="radio" name="rM" value="manual" ${man?'checked':''}> Manual:</label>
        <input type="number" id="rV" step="0.01" class="ii iw" value="${N(cfg('usdToCop'))||4000}">
        <button class="btn sm" id="rGo">Guardar</button></div>
      <div class="note">El valor manual prevalece sobre el tipo en vivo y se guarda en la hoja Config.</div></div>

    <div class="grid2">
      <div class="card"><h3>Categorías</h3><div class="tbl"><table>
        <thead><tr><th>Tipo</th><th>Nombre</th><th></th></tr></thead>
        <tbody id="cT">${S.categorias.map((c,i)=>`
          <tr data-i="${i}" data-id="${esc(c.id)}">
            <td><select class="ii cTp"><option value="ingreso" ${c.tipo==='ingreso'?'selected':''}>Ingreso</option><option value="gasto" ${c.tipo==='gasto'?'selected':''}>Gasto</option></select></td>
            <td><input class="ii cN" value="${esc(c.nombre)}" style="width:170px"></td>
            <td class="acts"><button class="link warn cX">Eliminar</button></td></tr>`).join('')}
        </tbody></table></div>
        <div class="bar" style="margin:10px 0 0"><button class="ghost sm" id="cAdd">+ Agregar</button><div class="sp"></div><button class="btn" id="cGo">Guardar</button></div>
        <div class="note">"Ventas e-commerce", "Envíos" y "Retainer" las usan los registros automáticos: no las elimines.</div></div>
      <div class="card"><h3>Usuarios y PIN</h3><div class="tbl"><table>
        <thead><tr><th>Nombre</th><th>PIN</th><th>Rol</th><th></th></tr></thead>
        <tbody id="uT">${S.usuarios.map((u,i)=>`
          <tr data-i="${i}" data-id="${esc(u.id)}">
            <td><input class="ii uN" value="${esc(u.nombre)}" style="width:130px"></td>
            <td><input class="ii uP" value="${esc(u.pin)}" style="width:80px"></td>
            <td><select class="ii uR"><option value="admin" ${u.rol==='admin'?'selected':''}>Admin</option><option value="usuario" ${u.rol==='usuario'?'selected':''}>Usuario</option></select></td>
            <td class="acts"><button class="link warn uX">Eliminar</button></td></tr>`).join('')}
        </tbody></table></div>
        <div class="bar" style="margin:10px 0 0"><button class="ghost sm" id="uAdd">+ Agregar</button><div class="sp"></div><button class="btn" id="uGo">Guardar</button></div>
        <div class="note">Debe existir al menos un admin. Si cambias tu PIN, vuelve a entrar.</div></div>
    </div>

    <div class="grid2">
      <div class="card"><h3>Fuentes de ingreso</h3>
        <div id="fT">${S.fuentes.map((f,i)=>`
          <div class="bar" style="margin-bottom:6px" data-i="${i}" data-id="${esc(f.id)}">
            <input class="ii fN" value="${esc(f.nombre)}" style="flex:1"><button class="link warn fX">Eliminar</button></div>`).join('')}</div>
        <div class="bar" style="margin:8px 0 0"><button class="ghost sm" id="fAdd">+ Agregar</button><div class="sp"></div><button class="btn" id="fGo">Guardar</button></div></div>
      <div class="card"><h3>Tarjetas</h3><div class="tbl"><table>
        <thead><tr><th>Etiqueta</th><th>Últimos 4</th><th>Empresa</th><th></th></tr></thead>
        <tbody id="jT">${S.tarjetas.map((t,i)=>`
          <tr data-i="${i}" data-id="${esc(t.id)}">
            <td><input class="ii jE" value="${esc(t.etiqueta)}" style="width:120px"></td>
            <td><input class="ii jL" value="${esc(t.last4)}" maxlength="4" style="width:58px"></td>
            <td><select class="ii jM">${S.empresas.map(e=>`<option value="${esc(e.id)}" ${String(t.empresaId)===String(e.id)?'selected':''}>${esc(e.nombre)}</option>`).join('')}</select></td>
            <td class="acts"><button class="link warn jX">Eliminar</button></td></tr>`).join('')}
        </tbody></table></div>
        <div class="bar" style="margin:10px 0 0"><button class="ghost sm" id="jAdd">+ Agregar</button><div class="sp"></div><button class="btn" id="jGo">Guardar</button></div></div>
    </div>

    <div class="card"><h3>Datos</h3>
      <div class="bar" style="margin:0">
        <button class="ghost" id="dCsv">Exportar movimientos (CSV)</button>
        <button class="ghost" id="dRe">Recargar desde la hoja</button></div></div>`;

  /* Empresas */
  const gEmp = ()=>$$('#eT tr').map(tr=>({ id:tr.dataset.id||'', nombre:tr.querySelector('.eN').value,
    moneda:tr.querySelector('.eM').value, color:tr.querySelector('.eC').value, tipo:tr.querySelector('.eT2').value,
    freqComprasMes:N(tr.querySelector('.eF').value), vidaClienteMeses:N(tr.querySelector('.eV').value) }));
  $('#eAdd').onclick = ()=>{ S.empresas.push({id:'',nombre:'Nueva empresa',moneda:'COP',color:'#0a6cff',tipo:'ecommerce',freqComprasMes:1,vidaClienteMeses:12}); draw(); };
  $('#eT').addEventListener('click',ev=>{ const b=ev.target.closest('.eX');
    if(b&&confirm('¿Eliminar la empresa? Sus datos históricos quedarán huérfanos.')){ S.empresas.splice(Number(b.closest('tr').dataset.i),1); draw(); } });
  $('#eGo').onclick = async ()=>{ if (await act('saveCompanies',{rows:gEmp()},'Empresas guardadas')) boot(); };

  /* FX */
  $('#rGo').onclick = ()=>act('setRate',{ manual:document.querySelector('input[name=rM]:checked').value==='manual',
    usdToCop:N($('#rV').value) },'Tipo de cambio guardado').then(()=>drawFx());

  /* Categorías */
  $('#cAdd').onclick = ()=>{ S.categorias.push({id:'',tipo:'gasto',nombre:'Nueva categoría'}); draw(); };
  $('#cT').addEventListener('click',ev=>{ const b=ev.target.closest('.cX'); if(b){ S.categorias.splice(Number(b.closest('tr').dataset.i),1); draw(); } });
  $('#cGo').onclick = ()=>act('saveCategories',{rows:$$('#cT tr').map(tr=>({id:tr.dataset.id||'',
    tipo:tr.querySelector('.cTp').value, nombre:tr.querySelector('.cN').value}))},'Categorías guardadas');

  /* Usuarios */
  $('#uAdd').onclick = ()=>{ S.usuarios.push({id:'',nombre:'Nuevo usuario',pin:'',rol:'usuario'}); draw(); };
  $('#uT').addEventListener('click',ev=>{ const b=ev.target.closest('.uX');
    if(b&&confirm('¿Eliminar usuario?')){ S.usuarios.splice(Number(b.closest('tr').dataset.i),1); draw(); } });
  $('#uGo').onclick = async ()=>{
    const rows = $$('#uT tr').map(tr=>({id:tr.dataset.id||'', nombre:tr.querySelector('.uN').value,
      pin:tr.querySelector('.uP').value, rol:tr.querySelector('.uR').value}));
    if (await act('saveUsers',{rows},'Usuarios guardados')){
      const me = rows.find(u=>String(u.id)===String(S.user.id));
      if (me && String(me.pin)!==S.pin){ okey('Tu PIN cambió: vuelve a entrar'); setTimeout(leave,1200); }
    }
  };

  /* Fuentes */
  $('#fAdd').onclick = ()=>{ S.fuentes.push({id:'',nombre:''}); draw(); };
  $('#fT').addEventListener('click',ev=>{ const b=ev.target.closest('.fX'); if(b){ S.fuentes.splice(Number(b.closest('[data-i]').dataset.i),1); draw(); } });
  $('#fGo').onclick = ()=>{
    const rows=[]; $$('#fT [data-i]').forEach(d=>{ const n=d.querySelector('.fN').value.trim(); if(n) rows.push({id:d.dataset.id||'', nombre:n}); });
    act('saveFuentes',{rows},'Fuentes guardadas');
  };

  /* Tarjetas */
  $('#jAdd').onclick = ()=>{ S.tarjetas.push({id:'',empresaId:(S.empresas[0]||{}).id,etiqueta:'',last4:'',nota:''}); draw(); };
  $('#jT').addEventListener('click',ev=>{ const b=ev.target.closest('.jX'); if(b){ S.tarjetas.splice(Number(b.closest('tr').dataset.i),1); draw(); } });
  $('#jGo').onclick = ()=>act('saveTarjetas',{rows:$$('#jT tr').map(tr=>({id:tr.dataset.id||'',
    empresaId:tr.querySelector('.jM').value, etiqueta:tr.querySelector('.jE').value,
    last4:tr.querySelector('.jL').value, nota:''}))},'Tarjetas guardadas');

  /* Datos */
  $('#dCsv').onclick = ()=>csv('movimientos_todos.csv',
    ['Fecha','Empresa','Tipo','Categoría','Monto','Moneda','IVA%','IVA','Fuente','Tarjeta','Origen','Nota','Usuario','Creado'],
    S.movimientos.map(m=>[String(m.fecha).slice(0,10),empN(m.empresaId),m.tipo,m.categoria,m.monto,empM(m.empresaId),
      m.ivaPct,m.ivaMonto,m.fuente,cardLbl(m.tarjetaId),isLinked(m)?linkedLbl(m):'Manual',m.nota,m.usuario,m.creado]));
  $('#dRe').onclick = async ()=>{
    try{ const d=await api('bootstrap'); absorb(d); okey('Datos recargados'); boot(); }
    catch(e){ oops(e.message); }
  };
}
</script>
</body>
</html>
